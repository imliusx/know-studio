services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arag-postgres
    environment:
      POSTGRES_DB: arag
      POSTGRES_USER: arag
      POSTGRES_PASSWORD: arag
    ports:
      - "5432:5432"
    volumes:
      - arag-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arag -d arag"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: ./deploy/docker/elasticsearch
      args:
        ELASTICSEARCH_VERSION: 8.18.1
        IK_VERSION: 8.18.1
    image: know-studio/elasticsearch-ik:8.18.1
    container_name: arag-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - arag-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: arag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - arag-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: arag-redis
    ports:
      - "6379:6379"
    volumes:
      - arag-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: arag-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - arag-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: arag-ollama
    ports:
      - "11434:11434"
    volumes:
      - arag-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: arag-ollama-model-init
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "Pulling embedding model bge-m3..."
        ollama pull bge-m3
        if [ "$${OLLAMA_CHAT_FALLBACK_ENABLED}" = "true" ]; then
          echo "Pulling fallback chat model $${OLLAMA_CHAT_MODEL}..."
          ollama pull "$${OLLAMA_CHAT_MODEL}"
        fi
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_FALLBACK_ENABLED: ${OLLAMA_CHAT_FALLBACK_ENABLED:-true}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:1.5b}
    depends_on:
      ollama:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: arag-prometheus
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - arag-prometheus-data:/prometheus

  tempo:
    image: grafana/tempo:2.8.1
    container_name: arag-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/docker/observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - arag-tempo-data:/var/tempo

  grafana:
    image: grafana/grafana:12.0.1
    container_name: arag-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/docker/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - arag-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  arag-postgres-data:
  arag-es-data:
  arag-minio-data:
  arag-redis-data:
  arag-rabbitmq-data:
  arag-ollama-data:
  arag-prometheus-data:
  arag-tempo-data:
  arag-grafana-data:
