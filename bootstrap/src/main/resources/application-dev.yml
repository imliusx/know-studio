server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_CHUNK_SIZE:100MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:100MB}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:arag}
    username: ${POSTGRES_USER:arag}
    password: ${POSTGRES_PASSWORD:arag}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}

# 阶段 1+ 逐步补充：
#   datasource (PostgreSQL + pgvector) / elasticsearch / minio / ollama / dashscope / sa-token

arag:
  id:
    worker-id: ${ARAG_WORKER_ID:0}
    datacenter-id: ${ARAG_DATACENTER_ID:0}
  ai:
    routing:
      failure-threshold: ${AI_FAILURE_THRESHOLD:3}
      open-duration: ${AI_OPEN_DURATION:30s}
    rerank:
      enabled: ${RERANK_ENABLED:false}
      base-url: ${RERANK_BASE_URL:http://localhost:8081}
      timeout: ${RERANK_TIMEOUT:10s}
      priority: ${RERANK_PRIORITY:10}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:arag-documents}
      upload-expiry: ${UPLOAD_EXPIRY:24h}
  ingestion:
    mq:
      retry-delays:
        - ${INGESTION_RETRY_DELAY_1:5s}
        - ${INGESTION_RETRY_DELAY_2:30s}
        - ${INGESTION_RETRY_DELAY_3:2m}
  agent:
    mcp:
      timeout: ${MCP_TIMEOUT:15s}
      web-search:
        url: ${MCP_WEB_SEARCH_URL:}
        tool-name: ${MCP_WEB_SEARCH_TOOL:web_search}
      business:
        url: ${MCP_BUSINESS_URL:}
        tool-name: ${MCP_BUSINESS_TOOL:business_lookup}
  observability:
    otel:
      enabled: ${OTEL_ENABLED:false}
      service-name: ${OTEL_SERVICE_NAME:arag}
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      export-timeout: ${OTEL_EXPORT_TIMEOUT:10s}
    langfuse:
      enabled: ${LANGFUSE_ENABLED:false}
      base-url: ${LANGFUSE_BASE_URL:https://cloud.langfuse.com}
      public-key: ${LANGFUSE_PUBLIC_KEY:}
      secret-key: ${LANGFUSE_SECRET_KEY:}
      environment: ${LANGFUSE_ENVIRONMENT:dev}
      timeout: ${LANGFUSE_TIMEOUT:5s}
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  is-read-header: true
  is-log: false
