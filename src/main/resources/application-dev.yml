server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5433/know_studio
    username: root
    password: 123456
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0
  flyway:
    enabled: true
  ai:
    model:
      chat: dashscope
      embedding: ollama
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: glm-5
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: qllama/bge-small-zh-v1.5
          # 单个输入超过模型 context length 时由 Ollama 截断，避免上传链路直接失败。
          truncate: true
    vectorstore:
      pgvector:
        # 向量索引类型
        index-type: HNSW
        # 距离度量，余弦值
        distance-type: COSINE_DISTANCE
        # 向量维度
        dimensions: 512
        # 批量处理大小
        max-document-batch-size: 9
        # 启动时是否自动创建表
        initialize-schema: true
        # 创建表名
        table-name: vector_store

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:know-studio-documents}

ingestion:
  chunking:
    target-tokens: 240
    max-tokens: 320
    overlap-tokens: 32
  vector:
    # 控制业务侧每次调用 VectorStore.add 的 chunk 数量，降低单次 Ollama embedding 请求压力。
    add-batch-size: 9

elasticsearch:
  host: localhost
  port: 9200
  scheme: http
  index-name: know_studio_document_chunks

# Sa-Token 登录态配置：token 从 Authorization: Bearer 头读取，会话存 Redis。
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  # 会话有效期 14 天，对齐原 refresh token 有效期。
  timeout: 1209600
  # 不做无操作过期，会话只受 timeout 约束。
  active-timeout: -1
  # 同一账号重复登录时踢掉旧会话，对齐原“登录时吊销全部旧 token”行为。
  is-concurrent: false
  is-read-cookie: false
  is-read-header: true
  token-style: random-64
  is-log: false

ddrag:
  dev-admin:
    username: ${KNOW_STUDIO_DEV_ADMIN_USERNAME:admin}
    email: ${KNOW_STUDIO_DEV_ADMIN_EMAIL:admin@local.know-studio.test}
    display-name: ${KNOW_STUDIO_DEV_ADMIN_DISPLAY_NAME:开发环境管理员}
    password: ${KNOW_STUDIO_DEV_ADMIN_PASSWORD:Admin@123456}
    user-code: ${KNOW_STUDIO_DEV_ADMIN_USER_CODE:admin}

assistant:
  session:
    summary:
      message-threshold: 20
      token-threshold: 8000
      stale-days: 7

logging:
  level:
    com.dong.ddrag.assistant.memory.AssistantShortTermMemoryHook: DEBUG
    com.dong.ddrag.assistant.agent.AssistantAgentFacade: DEBUG
